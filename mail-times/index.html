<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Duchat Mail - Временная почта</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4">
    <div class="max-w-2xl mx-auto mt-10">
        <h1 class="text-4xl font-black text-center mb-2 text-blue-500">DUCHAT MAIL</h1>
        <p class="text-center text-slate-400 mb-8">Твоя анонимная почта на 30 минут</p>

        <div id="address-selector" class="grid grid-cols-1 gap-4 mb-8">
            </div>

        <div id="mail-viewer" class="hidden">
            <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
                <h2 id="current-address" class="text-xl font-bold text-blue-400"></h2>
                <button onclick="location.reload()" class="text-xs text-slate-500 underline">Сменить адрес</button>
            </div>
            <div id="email-list" class="space-y-4">
                <p class="text-center text-slate-500 py-20">Ждем писем...</p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
<footer class="mt-10 pb-10 text-center">
    <p class="text-[10px] text-slate-600 px-4 leading-relaxed mb-4">
